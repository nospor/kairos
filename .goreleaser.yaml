version: 2
project_name: kairos

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./main.go
    ldflags:
      - -s -w -X github.com/nospor/kairos/cmd.Version={{.Version}} -X github.com/nospor/kairos/cmd.commit={{.ShortCommit}} -X github.com/nospor/kairos/cmd.date={{.Date}}

archives:
  - formats:
      - tar.gz
    # this name template makes the archives look very professional
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  disable: true # We will generate the changelog using git-cliff in our release pipeline instead
